<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Velocity Royale - 3D Race HD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: Arial, sans-serif; }
        
        /* फोन को टेढ़ा करने का धांसू मैसेज */
        #rotateMessage {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #111, #000); color: #00ffff; z-index: 100;
            justify-content: center; align-items: center; flex-direction: column; text-align: center;
        }
        #rotateMessage h2 { font-size: 28px; margin: 10px; color: #ffeb3b; text-shadow: 0 0 10px #ffeb3b;}
        #rotateMessage span { font-size: 60px; display: block; transform: rotate(90deg); margin-bottom: 20px;}

        /* अगर फोन सीधा है, तो गेम छुपा दो और मैसेज दिखाओ */
        @media screen and (orientation: portrait) {
            #rotateMessage { display: flex; }
            #gameUI { display: none; }
        }
        /* अगर फोन टेढ़ा है, तो मैसेज छुपा दो और गेम दिखाओ */
        @media screen and (orientation: landscape) {
            #rotateMessage { display: none; }
            #gameUI { display: block; }
        }

        #gameUI { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .top-ui { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: auto; }
        .back-btn { background: #ff004c; color: white; border: 2px solid white; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px red;}
        .player-info { background: rgba(0,0,0,0.8); color: #00ffff; padding: 8px 20px; border-radius: 8px; border: 1px solid #ffeb3b; font-weight: bold; }

        /* कंट्रोल्स अब किनारों पर रहेंगे (टेढ़े फोन के हिसाब से) */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 50px; box-sizing: border-box; pointer-events: auto; }
        .steer-btn { padding: 20px 40px; font-size: 22px; font-weight: bold; border-radius: 15px; background: rgba(255, 69, 0, 0.8); color: white; border: 2px solid white; user-select: none; box-shadow: 0 0 15px rgba(255, 69, 0, 0.5);}
        .steer-btn:active { background: #ff4500; transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="rotateMessage">
        <span>📱</span>
        <h2>PRO GAMER MODE</h2>
        <p>कृपया अपने फोन का 'Auto-Rotate' ऑन करें<br>और गेम खेलने के लिए फोन को टेढ़ा (Landscape) करें!</p>
    </div>

    <div id="gameUI">
        <div class="top-ui">
            <button class="back-btn" onclick="window.location.href='index.html'">🔙 LOBBY</button>
            <div class="player-info" id="playerName">👤 Player</div>
        </div>
        
        <div class="controls">
            <button class="steer-btn" id="leftBtn">⬅️ LEFT</button>
            <button class="steer-btn" id="rightBtn">RIGHT ➡️</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // प्लेयर का नाम
        let playerData = JSON.parse(localStorage.getItem("velocityData"));
        if(playerData) document.getElementById("playerName").innerText = "👤 " + playerData.name;

        // 3D सीन
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87ceeb, 10, 100); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10); 
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 3D सड़क
        const roadGeo = new THREE.PlaneGeometry(40, 1000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const lineGeo = new THREE.PlaneGeometry(0.5, 1000);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const line = new THREE.Mesh(lineGeo, lineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.y = 0.05;
        scene.add(line);

        // --- असली जैसी 3D कार (पहियों के साथ) ---
        const car = new THREE.Group();

        // कार की बॉडी (लाल रंग)
        const bodyGeo = new THREE.BoxGeometry(2.5, 0.6, 5);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff004c, metalness: 0.8, roughness: 0.2 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.6;
        car.add(body);

        // कार की छत और शीशा (काला रंग)
        const roofGeo = new THREE.BoxGeometry(1.8, 0.6, 2.5);
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.position.y = 1.2;
        roof.position.z = -0.5;
        car.add(roof);

        // 4 पहिए (काले रंग के टायर)
        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
        wheelGeo.rotateZ(Math.PI / 2); // टायर को सीधा खड़ा करने के लिए
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9 });
        
        const w1 = new THREE.Mesh(wheelGeo, wheelMat); w1.position.set(1.3, 0.5, 1.5); car.add(w1);
        const w2 = new THREE.Mesh(wheelGeo, wheelMat); w2.position.set(-1.3, 0.5, 1.5); car.add(w2);
        const w3 = new THREE.Mesh(wheelGeo, wheelMat); w3.position.set(1.3, 0.5, -1.5); car.add(w3);
        const w4 = new THREE.Mesh(wheelGeo, wheelMat); w4.position.set(-1.3, 0.5, -1.5); car.add(w4);

        scene.add(car);

        // कार चलाने का एनीमेशन
        let gameSpeed = 2;
        function animate() {
            requestAnimationFrame(animate);
            road.position.z += gameSpeed;
            line.position.z += gameSpeed;
            if (road.position.z > 200) { road.position.z = 0; line.position.z = 0; }
            renderer.render(scene, camera);
        }
        animate();

        // कंट्रोल्स
        function moveLeft() { if (car.position.x > -12) car.position.x -= 3; }
        function moveRight() { if (car.position.x < 12) car.position.x += 3; }

        document.getElementById("leftBtn").addEventListener("touchstart", moveLeft);
        document.getElementById("rightBtn").addEventListener("touchstart", moveRight);

        // स्क्रीन घूमने पर सेट करना
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
