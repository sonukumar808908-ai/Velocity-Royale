<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Royale - 3D Race</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #87ceeb; 
            text-align: center; 
            font-family: Arial, sans-serif; 
        }
        canvas { display: block; }
        
        /* ऊपर का UI (बैक बटन और प्लेयर का नाम) */
        .top-ui { 
            position: absolute; 
            top: 15px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 20px; 
            box-sizing: border-box; 
            z-index: 10; 
        }
        .back-btn { 
            background: #ff004c; 
            color: white; 
            border: 2px solid white; 
            padding: 10px 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .player-info { 
            background: rgba(0,0,0,0.7); 
            color: #00ffff; 
            padding: 10px 15px; 
            border-radius: 8px; 
            border: 1px solid #ffeb3b; 
            font-weight: bold;
        }

        /* नीचे के कंट्रोल्स */
        .controls { 
            position: absolute; 
            bottom: 30px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            z-index: 10; 
        }
        .steer-btn { 
            padding: 15px 35px; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 12px; 
            background: rgba(255, 69, 0, 0.8); 
            color: white; 
            border: 2px solid white; 
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.5);
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="top-ui">
        <button class="back-btn" onclick="goBack()">🔙 LOBBY</button>
        <div class="player-info" id="playerName">👤 Loading...</div>
    </div>
    
    <div class="controls">
        <button class="steer-btn" id="leftBtn">⬅️ LEFT</button>
        <button class="steer-btn" id="rightBtn">RIGHT ➡️</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. लॉबी वाले पेज से प्लेयर का नाम लाना
        let playerData = JSON.parse(localStorage.getItem("velocityData"));
        if(playerData) {
            document.getElementById("playerName").innerText = "👤 " + playerData.name;
        }

        // 2. वापस लॉबी में जाने का फंक्शन
        function goBack() {
            window.location.href = "index.html";
        }

        // 3. 3D सीन और कैमरा
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87ceeb, 10, 100); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8); 
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. लाइट्स
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 5. 3D सड़क
        const roadGeo = new THREE.PlaneGeometry(30, 1000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const lineGeo = new THREE.PlaneGeometry(0.5, 1000);
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const line = new THREE.Mesh(lineGeo, lineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.y = 0.05;
        scene.add(line);

        // 6. 3D कार
        const bodyGeo = new THREE.BoxGeometry(2, 1, 4);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.7, roughness: 0.2 });
        const car = new THREE.Mesh(bodyGeo, bodyMat);
        car.position.y = 0.5;
        scene.add(car);

        // 7. गेम को चलाने वाला लूप
        let gameSpeed = 1.5;
        function animate() {
            requestAnimationFrame(animate);
            road.position.z += gameSpeed;
            line.position.z += gameSpeed;
            
            if (road.position.z > 200) {
                road.position.z = 0;
                line.position.z = 0;
            }
            renderer.render(scene, camera);
        }
        animate();

        // 8. कार कंट्रोल्स
        function moveLeft() { if (car.position.x > -10) car.position.x -= 2.5; }
        function moveRight() { if (car.position.x < 10) car.position.x += 2.5; }

        document.getElementById("leftBtn").addEventListener("touchstart", moveLeft);
        document.getElementById("rightBtn").addEventListener("touchstart", moveRight);
        
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
