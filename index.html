<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Royale - Lobby</title>
    <style>
        /* गेम की लॉबी का डिज़ाइन */
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* शानदार डार्क बैकग्राउंड */
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
        }

        /* टॉप बार (प्रोफाइल और डायमंड्स) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #00ffff;
        }

        /* प्रोफाइल बटन */
        .profile-btn {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #00ffff;
            cursor: pointer;
        }
        .profile-btn img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
            border: 2px solid #ffeb3b;
        }
        .profile-info h3 { margin: 0; font-size: 16px; }
        .profile-info p { margin: 0; font-size: 12px; color: #ffeb3b; }

        /* करेंसी (डायमंड्स) */
        .currency {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 15px;
            border-radius: 15px;
            border: 1px solid #ffeb3b;
            color: #ffeb3b;
            font-weight: bold;
        }

        /* गेम का नाम और बीच का हिस्सा */
        .center-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .game-title {
            font-size: 40px;
            font-weight: 900;
            color: transparent;
            -webkit-text-stroke: 1.5px #fff;
            background: linear-gradient(to right, #ff4500, #ffeb3b);
            -webkit-background-clip: text;
            text-shadow: 0 0 20px rgba(255, 69, 0, 0.8);
            margin-bottom: 50px;
        }

        /* मेनू बटन्स */
        .menu-btn {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            margin: 10px;
            width: 80%;
            max-width: 300px;
            border: none;
            color: white;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        .btn-start { background: linear-gradient(45deg, #00c6ff, #0072ff); border: 2px solid #00ffff; }
        .btn-garage { background: linear-gradient(45deg, #f12711, #f5af19); border: 2px solid #ffeb3b; }

        /* पॉप-अप प्रोफाइल बॉक्स (Modal) */
        .modal {
            display: none; /* शुरुआत में छुपा रहेगा */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00ffff;
            text-align: center;
            width: 80%;
            max-width: 350px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        .modal-content img {
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ffeb3b; margin-bottom: 15px;
        }
        .modal-content h2 { margin: 10px 0; color: white; }
        .uid-box {
            background: #222; padding: 10px; border-radius: 8px; margin: 15px 0;
            color: #00ffff; font-family: monospace; font-size: 18px; letter-spacing: 2px;
        }
        .stats {
            display: flex; justify-content: space-around; margin-bottom: 20px;
        }
        .stat-box { background: #333; padding: 10px; border-radius: 8px; width: 40%; }
        .close-btn {
            background: red; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="profile-btn" onclick="openProfile()">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sonu" alt="Avatar">
            <div class="profile-info">
                <h3 id="display-name">Player_01</h3>
                <p>Lv. <span id="display-level">1</span></p>
            </div>
        </div>
        
        <div class="currency">💎 500</div>
    </div>

    <div class="center-content">
        <div class="game-title">VELOCITY<br>ROYALE</div>
        
        <button class="menu-btn btn-start" onclick="startGame()">🏁 START GAME</button>
        <button class="menu-btn btn-garage" onclick="openGarage()">🎰 LUCK ROYALE</button>
    </div>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sonu" alt="Avatar">
            <h2 id="modal-name">Player_01</h2>
            <div class="uid-box">UID: <span id="modal-uid">Loading...</span></div>
            
            <div class="stats">
                <div class="stat-box">
                    <p style="margin:0; font-size:12px; color:#aaa;">Level</p>
                    <h3 style="margin:0; color:#ffeb3b;" id="modal-level">1</h3>
                </div>
                <div class="stat-box">
                    <p style="margin:0; font-size:12px; color:#aaa;">Likes</p>
                    <h3 style="margin:0; color:#00ffff;">❤️ 45</h3>
                </div>
            </div>

            <button class="close-btn" onclick="closeProfile()">CLOSE</button>
        </div>
    </div>

    <script>
        // गेम का डेटा (इसे हम localStorage में सेव करेंगे ताकि यह डिलीट न हो)
        let playerData = JSON.parse(localStorage.getItem("velocityData"));

        // अगर प्लेयर पहली बार गेम खोल रहा है, तो नया डेटा और UID बनाओ
        if (!playerData) {
            playerData = {
                name: "Sonu_Racer",
                level: 15,
                // एक रैंडम 8 अंकों का UID जनरेट करना
                uid: Math.floor(10000000 + Math.random() * 90000000) 
            };
            localStorage.setItem("velocityData", JSON.stringify(playerData));
        }

        // स्क्रीन पर प्लेयर का डेटा सेट करना
        document.getElementById("display-name").innerText = playerData.name;
        document.getElementById("display-level").innerText = playerData.level;
        document.getElementById("modal-name").innerText = playerData.name;
        document.getElementById("modal-level").innerText = playerData.level;
        document.getElementById("modal-uid").innerText = playerData.uid;

        // प्रोफाइल पॉप-अप खोलने और बंद करने का लॉजिक
        function openProfile() {
            document.getElementById("profileModal").style.display = "flex";
        }

        function closeProfile() {
            document.getElementById("profileModal").style.display = "none";
        }

        // दूसरे पेजों पर जाने के लिंक्स
             function startGame() {
         window.location.href = "game.html";
     }

     function openGarage() {
         window.location.href = "spin.html";
     }
    </script>

</body>
</html>
