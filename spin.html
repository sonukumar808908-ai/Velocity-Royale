<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Royale - Luck Royale</title>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: radial-gradient(circle, #1a2a6c, #112240, #0a192f); 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            text-align: center;
        }

        /* टॉप बार */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid #ffeb3b;
        }
        .back-btn {
            background: #ff004c;
            color: white;
            border: 2px solid white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .currency {
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid #00ffff;
            color: #00ffff;
            font-weight: bold;
            font-size: 18px;
        }

        /* स्पिन एरिया */
        .spin-area {
            margin-top: 50px;
        }
        .crate-img {
            font-size: 100px;
            text-shadow: 0 0 30px #ffeb3b;
            margin-bottom: 20px;
            transition: transform 0.1s;
        }
        
        /* स्पिन बटन */
        .spin-btn {
            background: linear-gradient(45deg, #f12711, #f5af19);
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            border: 3px solid #ffeb3b;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(245, 175, 25, 0.8);
            cursor: pointer;
            margin-top: 20px;
        }
        .spin-btn:active { transform: scale(0.95); }

        /* प्राइज पॉप-अप */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ffeb3b;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 235, 59, 0.5);
            animation: popIn 0.5s ease;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .prize-emoji { font-size: 80px; margin: 10px 0; }
        .prize-name { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .close-btn {
            background: #00ffff; color: #000; padding: 10px 30px; border: none; border-radius: 5px; font-weight: bold; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="goBack()">🔙 LOBBY</button>
        <div class="currency">💎 <span id="diamond-count">0</span></div>
    </div>

    <div class="spin-area">
        <h1 style="color: #ffeb3b; text-shadow: 0 0 10px #ff4500;">LUCK ROYALE</h1>
        <div class="crate-img" id="crate">📦</div>
        <button class="spin-btn" onclick="startSpin()">SPIN (💎 50)</button>
        <p style="color: #aaa; margin-top: 15px;">Win Legendary Cars & Items!</p>
    </div>

    <div id="prizeModal" class="modal">
        <div class="modal-content">
            <h2 id="congrats-text" style="color: #ffeb3b;">CONGRATULATIONS!</h2>
            <div class="prize-emoji" id="prize-emoji">🚗</div>
            <div class="prize-name" id="prize-name">Neon Sports Car</div>
            <button class="close-btn" onclick="closeModal()">OKAY</button>
        </div>
    </div>

    <script>
        // 1. डेटाबेस (localStorage) से प्लेयर का डेटा लाना
        let playerData = JSON.parse(localStorage.getItem("velocityData"));
        
        // अगर डायमंड्स का डेटा नहीं है, तो पहली बार प्लेयर को 500 डायमंड्स फ्री दो!
        if (playerData && playerData.diamonds === undefined) {
            playerData.diamonds = 500;
            localStorage.setItem("velocityData", JSON.stringify(playerData));
        }
        
        // स्क्रीन पर डायमंड्स दिखाना
        function updateDiamonds() {
            if(playerData) {
                document.getElementById("diamond-count").innerText = playerData.diamonds;
            }
        }
        updateDiamonds();

        // 2. वापस लॉबी में जाने का फंक्शन
        function goBack() {
            window.location.href = "index.html";
        }

        // 3. स्पिन करने का लॉजिक (Random Number Generator)
        function startSpin() {
            if (playerData.diamonds < 50) {
                alert("Not enough Diamonds! 💎 Play matches to earn more.");
                return;
            }

            // 50 डायमंड्स काटना
            playerData.diamonds -= 50;
            localStorage.setItem("velocityData", JSON.stringify(playerData));
            updateDiamonds();

            // स्पिन का एनीमेशन
            let crate = document.getElementById("crate");
            let spinInterval = setInterval(() => {
                crate.style.transform = `rotate(${Math.random() * 30 - 15}deg) scale(1.1)`;
            }, 50);

            // 2 सेकंड बाद प्राइज देना
            setTimeout(() => {
                clearInterval(spinInterval);
                crate.style.transform = "rotate(0deg) scale(1)";
                calculatePrize();
            }, 2000);
        }

        // 4. कौन सा प्राइज मिलेगा (Probability System)
        function calculatePrize() {
            let roll = Math.floor(Math.random() * 100) + 1; // 1 से 100 तक कोई भी नंबर
            
            let prizeName = "";
            let prizeEmoji = "";
            let titleColor = "#ffeb3b";

            if (roll <= 5) {
                // 5% चांस: लेजेंड्री कार
                prizeName = "Legendary GTR 4K";
                prizeEmoji = "🏎️";
                titleColor = "#ff004c"; // लाल रंग
            } else if (roll <= 25) {
                // 20% चांस: एपिक गाड़ी (इंडियन)
                prizeName = "Modified Thar Off-Road";
                prizeEmoji = "🚙";
                titleColor = "#00ffff"; // नीला रंग
            } else if (roll <= 60) {
                // 35% चांस: नाइट्रो बूस्ट
                prizeName = "Max Nitro Boost x5";
                prizeEmoji = "🔥";
            } else {
                // 40% चांस: नॉर्मल सिल्वर कॉइन्स
                prizeName = "Silver Coins x100";
                prizeEmoji = "🪙";
                titleColor = "#ffffff";
            }

            // पॉप-अप में प्राइज दिखाना
            document.getElementById("congrats-text").style.color = titleColor;
            document.getElementById("prize-emoji").innerText = prizeEmoji;
            document.getElementById("prize-name").innerText = prizeName;
            document.getElementById("prize-name").style.color = titleColor;
            
            document.getElementById("prizeModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("prizeModal").style.display = "none";
        }
    </script>

</body>
</html>
